<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="styles.css"> <!-- Ensure correct path -->
</head>
<body>
    <div id="bg"></div>
    <header>
        <h1>My Notes</h1>
        <input type="text" placeholder="Search notes..." id="search" aria-label="Search notes">
    </header>
    <main>
        <div id="note-container"></div>
        <button id="add-note" aria-label="Add a new note">+</button>
    </main>
    <footer>
        <p>© 2026 Notes App</p>
    </footer>
<div id="note-form" class="hidden">
    <div class="form-content">
        <h2 id="form-title">Add Note</h2>

        <input type="text" id="note-title" placeholder="Note title" />
        <textarea id="note-content" placeholder="Note content"></textarea>

        <button id="save-note">Save</button>
        <button id="cancel-note">Cancel</button>
    </div>
</div>

<script src="/src/index.js?v=2"></script>
</body>
</html>
